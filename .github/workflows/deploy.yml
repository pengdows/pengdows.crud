name: Build, Test & Publish NuGet Package

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'skills/**'
      - 'LICENSE'
      - 'logo.png'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'skills/**'
      - 'LICENSE'
      - 'logo.png'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # Needed for git push and release creation

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage.outputs.coverage }}
      stormgate_coverage: ${{ steps.stormgate_coverage.outputs.coverage }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect coverage settings changes in PRs
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail

          base_ref="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}"

          # Only block changes to coverage exclusion/inclusion patterns.
          # Timing settings (TestSessionTimeout) may legitimately differ between branches.
          exclusion_changes=$(git diff "$base_ref...HEAD" -- coverage.runsettings \
            | { grep '^[+-]' || true; } | { grep -v '^---' || true; } | { grep -v '^+++' || true; } \
            | { grep -iE '<(Include|Exclude|ExcludeByFile|ExcludeByAttribute)' || true; } \
            | wc -l)
          if [[ "$exclusion_changes" -gt 0 ]]; then
            echo "❌ coverage.runsettings coverage exclusions changed. Exclusion changes require explicit maintainer review."
            git diff "$base_ref...HEAD" -- coverage.runsettings
            exit 1
          fi

          echo "✅ coverage.runsettings exclusions unchanged."

      - name: Setup .NET SDKs
        # 8.0.x: primary target framework for all projects in this solution.
        # 10.0.x: included for improved Roslyn analyzers and nullability checking;
        #         the SDK can build net8.0 TFMs. Add net10.0 to csproj files when
        #         ready to ship a net10.0 TFM.
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore pengdows.crud.sln

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Verify interface baselines
        run: |
          dotnet run --project tools/interface-api-check/InterfaceApiCheck.csproj --configuration Release -- \
            --verify \
            --baseline pengdows.crud.abstractions/ApiBaseline/interfaces.txt \
            --assembly pengdows.crud.abstractions/bin/Release/net8.0/pengdows.crud.abstractions.dll

      - name: Install coverage tools
        run: |
            dotnet tool install --global dotnet-reportgenerator-globaltool
            echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Clean previous coverage results
        run: rm -rf ./TestResults

      - name: Run tests and collect coverage (2m hang watchdog)
        run: |
          dotnet test --no-build --configuration Release \
            --blame-hang --blame-hang-timeout 120s \
            --filter "FullyQualifiedName!~pengdows.crud.IntegrationTests" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --settings coverage.runsettings

      - name: Run integration suite
        run: |
          dotnet run --no-build --configuration Release --project testbed/testbed.csproj

      - name: Generate coverage report
        run: |
            reportgenerator \
              -reports:"TestResults/**/coverage.cobertura.xml" \
              -targetdir:"coverage-report" \
              -reporttypes:"Html;Cobertura" \
              -assemblyfilters:"+pengdows.crud;-pengdows.crud.Tests;-pengdows.crud.abstractions;-pengdows.crud.fakeDb;-testbed" \
              -classfilters:"-*Test*;-*Mock*"

      - name: Generate stormgate coverage report
        run: |
            reportgenerator \
              -reports:"TestResults/**/coverage.cobertura.xml" \
              -targetdir:"coverage-report-stormgate" \
              -reporttypes:"Html;Cobertura" \
              -assemblyfilters:"+pengdows.stormgate;-pengdows.stormgate.Tests" \
              -classfilters:"-*Test*;-*Mock*"

      - name: Enforce pengdows.crud coverage floor and ratchet from Cobertura XML
        id: coverage
        run: |
          set -euo pipefail

          # Parse the reportgenerator Cobertura output, which is already filtered
          # to pengdows.crud via -assemblyfilters in the previous step.
          xml_file="coverage-report/Cobertura.xml"
          if [[ ! -f "${xml_file}" ]]; then
            echo "❌ ${xml_file} not found"
            exit 1
          fi

          rate=$(grep -m1 'line-rate="' "$xml_file" | sed -n 's/.*line-rate="\([^"]*\)".*/\1/p')
          if [[ -z "${rate}" ]]; then
            echo "❌ Could not parse line-rate from Cobertura XML"
            exit 1
          fi

          coverage_percent=$(awk "BEGIN { printf \"%.2f\", ${rate} * 100 }")
          echo "📊 pengdows.crud line coverage (from ${xml_file}): $coverage_percent%"

          minimum_floor=83
          baseline_file=".github/coverage-baseline.txt"
          if [[ ! -f "$baseline_file" ]]; then
            echo "❌ Missing $baseline_file"
            exit 1
          fi

          baseline=$(tr -d '[:space:]' < "$baseline_file")
          if ! [[ "$baseline" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
            echo "❌ Invalid baseline value in $baseline_file: '$baseline'"
            exit 1
          fi

          required="$minimum_floor"
          baseline_higher=$(awk "BEGIN { print ($baseline > $required) ? 1 : 0 }")
          if [[ "$baseline_higher" -eq 1 ]]; then
            required="$baseline"
          fi

          echo "🧭 Minimum floor: ${minimum_floor}%"
          echo "🧭 Baseline ratchet: ${baseline}%"
          echo "🧭 Effective required coverage: ${required}%"

          too_low=$(awk "BEGIN { print ($coverage_percent < $required) ? 1 : 0 }")
          if [[ "$too_low" -eq 1 ]]; then
            echo "❌ Coverage $coverage_percent% is below required $required%"
            exit 1
          else
            echo "✅ Coverage $coverage_percent% meets threshold"
          fi

          echo "coverage=$coverage_percent" >> "$GITHUB_OUTPUT"

      - name: Enforce pengdows.stormgate coverage floor and ratchet from Cobertura XML
        id: stormgate_coverage
        run: |
          set -euo pipefail

          xml_file="coverage-report-stormgate/Cobertura.xml"
          if [[ ! -f "${xml_file}" ]]; then
            echo "❌ ${xml_file} not found"
            exit 1
          fi

          rate=$(grep -m1 'line-rate="' "$xml_file" | sed -n 's/.*line-rate="\([^"]*\)".*/\1/p')
          if [[ -z "${rate}" ]]; then
            echo "❌ Could not parse line-rate from Cobertura XML"
            exit 1
          fi

          coverage_percent=$(awk "BEGIN { printf \"%.2f\", ${rate} * 100 }")
          echo "📊 pengdows.stormgate line coverage (from ${xml_file}): $coverage_percent%"

          minimum_floor=83
          baseline_file=".github/coverage-baseline.stormgate.txt"
          if [[ ! -f "$baseline_file" ]]; then
            echo "❌ Missing $baseline_file"
            exit 1
          fi

          baseline=$(tr -d '[:space:]' < "$baseline_file")
          if ! [[ "$baseline" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
            echo "❌ Invalid baseline value in $baseline_file: '$baseline'"
            exit 1
          fi

          required="$minimum_floor"
          baseline_higher=$(awk "BEGIN { print ($baseline > $required) ? 1 : 0 }")
          if [[ "$baseline_higher" -eq 1 ]]; then
            required="$baseline"
          fi

          echo "🧭 Minimum floor: ${minimum_floor}%"
          echo "🧭 Baseline ratchet: ${baseline}%"
          echo "🧭 Effective required coverage: ${required}%"

          too_low=$(awk "BEGIN { print ($coverage_percent < $required) ? 1 : 0 }")
          if [[ "$too_low" -eq 1 ]]; then
            echo "❌ Coverage $coverage_percent% is below required $required%"
            exit 1
          else
            echo "✅ Coverage $coverage_percent% meets threshold"
          fi

          echo "coverage=$coverage_percent" >> "$GITHUB_OUTPUT"

      - name: Enforce no TransactionScope usage
        run: |
          set -euo pipefail

          if grep -rn --include='*.cs' -E 'new\s+TransactionScope|using\s+System\.Transactions' \
            pengdows.crud \
            pengdows.crud.abstractions \
            pengdows.crud.fakeDb \
            testbed \
            pengdows.crud.Tests \
            pengdows.crud.IntegrationTests \
            pengdows.stormgate \
            pengdows.stormgate.Tests; then
            echo "❌ TransactionScope usage is forbidden. Use ctx.BeginTransaction()."
            exit 1
          fi

          echo "✅ No TransactionScope usage found."

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: TestResults/**/coverage.cobertura.xml
          # fail_ci_if_error intentionally false: CODECOV_TOKEN is unavailable on fork PRs,
          # so we suppress errors rather than blocking community contributions.
          fail_ci_if_error: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_file_fixes: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-report

      - name: Upload stormgate coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-stormgate
          path: coverage-report-stormgate

  publish:
    name: Publish NuGet Package
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET SDKs
        # 8.0.x: primary target framework for all projects in this solution.
        # 10.0.x: included for improved Roslyn analyzers and nullability checking;
        #         the SDK can build net8.0 TFMs. Add net10.0 to csproj files when
        #         ready to ship a net10.0 TFM.
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Generate version number
        id: version
        run: |
          version=$(sed -n 's/.*<Version>\([^<]*\)<\/Version>.*/\1/p' Directory.Build.props | head -n1)
          if [[ -z "$version" ]]; then
            echo "Version not found in Directory.Build.props"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build
        run: dotnet build pengdows.crud.sln -c Release

      - name: Pack with custom version
        run: |
          dotnet pack pengdows.crud.abstractions/pengdows.crud.abstractions.csproj -c Release \
            --no-build \
            -p:PackageVersion=${{ steps.version.outputs.version }}
          dotnet pack pengdows.crud.fakeDb/pengdows.crud.fakeDb.csproj -c Release \
            --no-build \
            -p:PackageVersion=${{ steps.version.outputs.version }}
          dotnet pack pengdows.crud/pengdows.crud.csproj -c Release \
            --no-build \
            -p:PackageVersion=${{ steps.version.outputs.version }}
          dotnet pack pengdows.stormgate/pengdows.stormgate.csproj -c Release \
            --no-build \
            -p:PackageVersion=${{ steps.version.outputs.version }}
      - name: Debug API Key
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY is empty!"
            exit 1
          else
            echo "NUGET_API_KEY is set and length is ${#NUGET_API_KEY}"
          fi
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      - name: Check if version already published
        id: nuget_check
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          status_crud=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.nuget.org/v3-flatcontainer/pengdows.crud/${VERSION}/${VERSION}.nupkg")
          status_abstractions=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.nuget.org/v3-flatcontainer/pengdows.crud.abstractions/${VERSION}/${VERSION}.nupkg")
          status_fakedb=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.nuget.org/v3-flatcontainer/pengdows.crud.fakedb/${VERSION}/${VERSION}.nupkg")
          status_stormgate=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.nuget.org/v3-flatcontainer/pengdows.stormgate/${VERSION}/${VERSION}.nupkg")

          echo "NuGet status for v$VERSION:"
          echo "  pengdows.crud: $status_crud"
          echo "  pengdows.crud.abstractions: $status_abstractions"
          echo "  pengdows.crud.fakedb: $status_fakedb"
          echo "  pengdows.stormgate: $status_stormgate"

          all_published=true
          for status in "$status_crud" "$status_abstractions" "$status_fakedb" "$status_stormgate"; do
            if [[ "$status" != "200" ]]; then
              all_published=false
              break
            fi
          done

          if [[ "$all_published" == "true" ]]; then
            echo "Version $VERSION already exists for all packages — skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION is not fully published — proceeding (--skip-duplicate handles already-pushed packages)."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push package to NuGet
        if: steps.nuget_check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          dotnet nuget push pengdows.crud.abstractions/bin/Release/pengdows.crud.abstractions.${{ steps.version.outputs.version }}.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate
          dotnet nuget push pengdows.crud.fakeDb/bin/Release/pengdows.crud.fakeDb.${{ steps.version.outputs.version }}.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate
          dotnet nuget push pengdows.crud/bin/Release/pengdows.crud.${{ steps.version.outputs.version }}.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate
          dotnet nuget push pengdows.stormgate/bin/Release/pengdows.stormgate.${{ steps.version.outputs.version }}.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Configure git identity
        if: steps.nuget_check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Tag the release
        if: steps.nuget_check.outputs.skip != 'true'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          existing=$(git tag -l "$TAG")
          if [[ -n "$existing" ]]; then
            tagged_sha=$(git rev-list -n1 "$TAG")
            if [[ "$tagged_sha" == "${{ github.sha }}" ]]; then
              echo "Tag $TAG already points at this commit — skipping tag creation."
            else
              echo "❌ Tag $TAG exists but points at $tagged_sha, not ${{ github.sha }}."
              exit 1
            fi
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        if: steps.nuget_check.outputs.skip != 'true'
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2.5.0
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: Automated release for version v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate next patch version
        id: next_version
        if: steps.nuget_check.outputs.skip != 'true'
        run: |
          set -euo pipefail

          current="${{ steps.version.outputs.version }}"
          IFS='.' read -r major minor patch <<< "$current"

          if [[ -z "$major" || -z "$minor" || -z "$patch" ]]; then
            echo "Could not parse semantic version: $current"
            exit 1
          fi

          if ! [[ "$major" =~ ^[0-9]+$ && "$minor" =~ ^[0-9]+$ && "$patch" =~ ^[0-9]+$ ]]; then
            echo "Semantic version must be numeric major.minor.patch: $current"
            exit 1
          fi

          next_patch=$((patch + 1))
          next_version="$major.$minor.$next_patch"
          next_assembly_version="$major.$minor.$next_patch.0"

          echo "next_version=$next_version" >> "$GITHUB_OUTPUT"
          echo "next_assembly_version=$next_assembly_version" >> "$GITHUB_OUTPUT"

      - name: Note protected branch push skip
        if: ${{ github.ref_protected && steps.nuget_check.outputs.skip != 'true' }}
        run: echo "Branch is protected; skipping automated semver bump commit and push."

      - name: Bump version for next release
        if: ${{ !github.ref_protected && steps.nuget_check.outputs.skip != 'true' }}
        run: |
          set -euo pipefail

          sed -i -E "s|<Version>[^<]+</Version>|<Version>${{ steps.next_version.outputs.next_version }}</Version>|" Directory.Build.props
          sed -i -E "s|<AssemblyVersion>[^<]+</AssemblyVersion>|<AssemblyVersion>${{ steps.next_version.outputs.next_assembly_version }}</AssemblyVersion>|" Directory.Build.props
          sed -i -E "s|<FileVersion>[^<]+</FileVersion>|<FileVersion>${{ steps.next_version.outputs.next_assembly_version }}</FileVersion>|" Directory.Build.props

          # Verify the bump actually applied — sed exits 0 even when no lines matched,
          # so an unchanged file means the pattern didn't match (e.g. reformatted XML).
          if git diff --exit-code Directory.Build.props > /dev/null 2>&1; then
            echo "❌ Version bump had no effect — sed pattern did not match Directory.Build.props"
            exit 1
          fi

          # Ratchet coverage baseline if this deploy improved coverage.
          new_coverage="${{ needs.build-and-test.outputs.coverage }}"
          current_baseline=$(tr -d '[:space:]' < .github/coverage-baseline.txt)
          is_higher=$(awk "BEGIN { print ($new_coverage > $current_baseline) ? 1 : 0 }")
          if [[ "$is_higher" -eq 1 ]]; then
            printf '%s\n' "$new_coverage" > .github/coverage-baseline.txt
            echo "📈 Coverage baseline ratcheted: ${current_baseline}% → ${new_coverage}%"
          else
            echo "ℹ️ Coverage baseline unchanged at ${current_baseline}%"
          fi

          new_stormgate_coverage="${{ needs.build-and-test.outputs.stormgate_coverage }}"
          current_stormgate_baseline=$(tr -d '[:space:]' < .github/coverage-baseline.stormgate.txt)
          is_stormgate_higher=$(awk "BEGIN { print ($new_stormgate_coverage > $current_stormgate_baseline) ? 1 : 0 }")
          if [[ "$is_stormgate_higher" -eq 1 ]]; then
            printf '%s\n' "$new_stormgate_coverage" > .github/coverage-baseline.stormgate.txt
            echo "📈 Stormgate coverage baseline ratcheted: ${current_stormgate_baseline}% → ${new_stormgate_coverage}%"
          else
            echo "ℹ️ Stormgate coverage baseline unchanged at ${current_stormgate_baseline}%"
          fi

      - name: Commit semver bump
        if: ${{ !github.ref_protected && steps.nuget_check.outputs.skip != 'true' }}
        run: |
          set -euo pipefail
          git add Directory.Build.props .github/coverage-baseline.txt .github/coverage-baseline.stormgate.txt
          git commit -m "chore: bump version to v${{ steps.next_version.outputs.next_version }} [skip ci]"

      - name: Push semver bump commit
        if: ${{ !github.ref_protected && steps.nuget_check.outputs.skip != 'true' }}
        run: git push origin HEAD:${{ github.event.repository.default_branch }}
