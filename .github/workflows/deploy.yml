name: Build, Test & Publish NuGet Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write  # Needed for git push and release creation

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect coverage settings changes in PRs
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail

          base_ref="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}"

          changed_count=$(git diff --name-only "$base_ref...HEAD" -- coverage.runsettings | wc -l)
          if [[ "$changed_count" -gt 0 ]]; then
            echo "❌ coverage.runsettings changed. Coverage exclusion changes require explicit maintainer review."
            git diff -- "$base_ref...HEAD" -- coverage.runsettings
            exit 1
          fi

          echo "✅ coverage.runsettings unchanged."

      - name: Setup .NET SDKs
        # 8.0.x: primary target framework for all projects in this solution.
        # 10.0.x: included for improved Roslyn analyzers and nullability checking;
        #         the SDK can build net8.0 TFMs. Add net10.0 to csproj files when
        #         ready to ship a net10.0 TFM.
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore pengdows.crud.sln

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Verify interface baselines
        run: |
          dotnet run --project tools/interface-api-check/InterfaceApiCheck.csproj --configuration Release -- \
            --verify \
            --baseline pengdows.crud.abstractions/ApiBaseline/interfaces.txt \
            --assembly pengdows.crud.abstractions/bin/Release/net8.0/pengdows.crud.abstractions.dll

      - name: Install coverage tools
        run: |
            dotnet tool install --global dotnet-reportgenerator-globaltool
            echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Clean previous coverage results
        run: rm -rf ./TestResults

      - name: Run tests and collect coverage (2m hang watchdog)
        run: |
          dotnet test --no-build --configuration Release \
            --blame-hang --blame-hang-timeout 120s \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --settings coverage.runsettings

      - name: Run integration suite
        run: |
          dotnet run --no-build --configuration Release --project testbed/testbed.csproj

      - name: Run benchmarks (internal smoke test only)
        run: |
          dotnet run --no-build --configuration Release --project benchmarks/CrudBenchmarks/CrudBenchmarks.csproj -- \
            --filter "CrudBenchmarks.Internal.*" \
            --iterationCount 1 --warmupCount 1

      - name: Generate coverage report
        run: |
            reportgenerator \
              -reports:"TestResults/**/coverage.cobertura.xml" \
              -targetdir:"coverage-report" \
              -reporttypes:"Html;Cobertura" \
              -assemblyfilters:"+pengdows.crud;-pengdows.crud.Tests;-pengdows.crud.abstractions;-pengdows.crud.fakeDb;-testbed" \
              -classfilters:"-*Test*;-*Mock*"

      - name: Enforce pengdows.crud coverage floor and ratchet from Cobertura XML
        run: |
          set -euo pipefail

          # Parse the reportgenerator Cobertura output, which is already filtered
          # to pengdows.crud via -assemblyfilters in the previous step.
          xml_file="coverage-report/Cobertura.xml"
          if [[ ! -f "${xml_file}" ]]; then
            echo "❌ ${xml_file} not found"
            exit 1
          fi

          rate=$(grep -oP 'line-rate="\K[0-9\.]+' "$xml_file" | head -n 1)
          if [[ -z "${rate}" ]]; then
            echo "❌ Could not parse line-rate from Cobertura XML"
            exit 1
          fi

          coverage_percent=$(awk "BEGIN { printf \"%.2f\", ${rate} * 100 }")
          echo "📊 pengdows.crud line coverage (from ${xml_file}): $coverage_percent%"

          minimum_floor=83
          baseline_file=".github/coverage-baseline.txt"
          if [[ ! -f "$baseline_file" ]]; then
            echo "❌ Missing $baseline_file"
            exit 1
          fi

          baseline=$(tr -d '[:space:]' < "$baseline_file")
          if ! [[ "$baseline" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
            echo "❌ Invalid baseline value in $baseline_file: '$baseline'"
            exit 1
          fi

          required="$minimum_floor"
          baseline_higher=$(awk "BEGIN { print ($baseline > $required) ? 1 : 0 }")
          if [[ "$baseline_higher" -eq 1 ]]; then
            required="$baseline"
          fi

          echo "🧭 Minimum floor: ${minimum_floor}%"
          echo "🧭 Baseline ratchet: ${baseline}%"
          echo "🧭 Effective required coverage: ${required}%"

          too_low=$(awk "BEGIN { print ($coverage_percent < $required) ? 1 : 0 }")
          if [[ "$too_low" -eq 1 ]]; then
            echo "❌ Coverage $coverage_percent% is below required $required%"
            exit 1
          else
            echo "✅ Coverage $coverage_percent% meets threshold"
          fi

      - name: Enforce no TransactionScope usage
        run: |
          set -euo pipefail

          if rg -n --glob '*.cs' 'new\s+TransactionScope|using\s+System\.Transactions' \
            pengdows.crud \
            pengdows.crud.abstractions \
            pengdows.crud.fakeDb \
            testbed \
            pengdows.crud.Tests \
            pengdows.crud.IntegrationTests; then
            echo "❌ TransactionScope usage is forbidden. Use ctx.BeginTransaction()."
            exit 1
          fi

          echo "✅ No TransactionScope usage found."

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: TestResults/**/coverage.cobertura.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_file_fixes: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report

  publish:
    name: Publish NuGet Package
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET SDKs
        # 8.0.x: primary target framework for all projects in this solution.
        # 10.0.x: included for improved Roslyn analyzers and nullability checking;
        #         the SDK can build net8.0 TFMs. Add net10.0 to csproj files when
        #         ready to ship a net10.0 TFM.
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Generate version number
        id: version
        run: |
          version=$(sed -n 's/.*<Version>\([^<]*\)<\/Version>.*/\1/p' Directory.Build.props | head -n1)
          if [[ -z "$version" ]]; then
            echo "Version not found in Directory.Build.props"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build
        run: dotnet build pengdows.crud.sln -c Release

      - name: Pack with custom version
        run: |
          dotnet pack pengdows.crud.abstractions/pengdows.crud.abstractions.csproj -c Release \
            --no-build \
            -p:PackageVersion=${{ steps.version.outputs.version }}
          dotnet pack pengdows.crud.fakeDb/pengdows.crud.fakeDb.csproj -c Release \
            --no-build \
            -p:PackageVersion=${{ steps.version.outputs.version }}
          dotnet pack pengdows.crud/pengdows.crud.csproj -c Release \
            --no-build \
            -p:PackageVersion=${{ steps.version.outputs.version }}
      - name: Debug API Key
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY is empty!"
            exit 1
          else
            echo "NUGET_API_KEY is set and length is ${#NUGET_API_KEY}"
          fi
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      - name: Check if version already published
        id: nuget_check
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          status_crud=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.nuget.org/v3-flatcontainer/pengdows.crud/${VERSION}/${VERSION}.nupkg")
          status_abstractions=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.nuget.org/v3-flatcontainer/pengdows.crud.abstractions/${VERSION}/${VERSION}.nupkg")
          status_fakedb=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.nuget.org/v3-flatcontainer/pengdows.crud.fakedb/${VERSION}/${VERSION}.nupkg")

          echo "NuGet status for v$VERSION:"
          echo "  pengdows.crud: $status_crud"
          echo "  pengdows.crud.abstractions: $status_abstractions"
          echo "  pengdows.crud.fakedb: $status_fakedb"

          all_published=true
          for status in "$status_crud" "$status_abstractions" "$status_fakedb"; do
            if [[ "$status" != "200" ]]; then
              all_published=false
              break
            fi
          done

          any_published=false
          for status in "$status_crud" "$status_abstractions" "$status_fakedb"; do
            if [[ "$status" == "200" ]]; then
              any_published=true
              break
            fi
          done

          if [[ "$all_published" == "true" ]]; then
            echo "Version $VERSION already exists for all packages — skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [[ "$any_published" == "true" ]]; then
            echo "❌ Version $VERSION is partially published. Resolve NuGet state before retrying."
            exit 1
          else
            echo "Version $VERSION is new for all packages — proceeding with publish."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push package to NuGet
        if: steps.nuget_check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          dotnet nuget push pengdows.crud.abstractions/bin/Release/pengdows.crud.abstractions.${{ steps.version.outputs.version }}.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY"
          dotnet nuget push pengdows.crud.fakeDb/bin/Release/pengdows.crud.fakeDb.${{ steps.version.outputs.version }}.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY"
          dotnet nuget push pengdows.crud/bin/Release/pengdows.crud.${{ steps.version.outputs.version }}.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY"
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Tag the release
        if: ${{ !github.ref_protected && steps.nuget_check.outputs.skip != 'true' }}
        run: |
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.nuget_check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: Automated release for version v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate next patch version
        id: next_version
        if: steps.nuget_check.outputs.skip != 'true'
        run: |
          set -euo pipefail

          current="${{ steps.version.outputs.version }}"
          IFS='.' read -r major minor patch <<< "$current"

          if [[ -z "$major" || -z "$minor" || -z "$patch" ]]; then
            echo "Could not parse semantic version: $current"
            exit 1
          fi

          if ! [[ "$major" =~ ^[0-9]+$ && "$minor" =~ ^[0-9]+$ && "$patch" =~ ^[0-9]+$ ]]; then
            echo "Semantic version must be numeric major.minor.patch: $current"
            exit 1
          fi

          next_patch=$((patch + 1))
          next_version="$major.$minor.$next_patch"
          next_assembly_version="$major.$minor.$next_patch.0"

          echo "next_version=$next_version" >> "$GITHUB_OUTPUT"
          echo "next_assembly_version=$next_assembly_version" >> "$GITHUB_OUTPUT"

      - name: Note protected branch push skip
        if: ${{ github.ref_protected && steps.nuget_check.outputs.skip != 'true' }}
        run: echo "Branch is protected; skipping automated semver bump commit and push."

      - name: Bump version for next release
        if: ${{ !github.ref_protected && steps.nuget_check.outputs.skip != 'true' }}
        run: |
          set -euo pipefail

          sed -i -E "s|<Version>[^<]+</Version>|<Version>${{ steps.next_version.outputs.next_version }}</Version>|" Directory.Build.props
          sed -i -E "s|<InformationalVersion>[^<]+</InformationalVersion>|<InformationalVersion>${{ steps.next_version.outputs.next_version }}</InformationalVersion>|" Directory.Build.props
          sed -i -E "s|<AssemblyVersion>[^<]+</AssemblyVersion>|<AssemblyVersion>${{ steps.next_version.outputs.next_assembly_version }}</AssemblyVersion>|" Directory.Build.props
          sed -i -E "s|<FileVersion>[^<]+</FileVersion>|<FileVersion>${{ steps.next_version.outputs.next_assembly_version }}</FileVersion>|" Directory.Build.props

      - name: Commit semver bump
        if: ${{ !github.ref_protected && steps.nuget_check.outputs.skip != 'true' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Directory.Build.props
          git commit -m "chore: bump version to v${{ steps.next_version.outputs.next_version }} [skip ci]"

      - name: Push semver bump commit
        if: ${{ !github.ref_protected && steps.nuget_check.outputs.skip != 'true' }}
        run: git push origin HEAD:${{ github.event.repository.default_branch }}
